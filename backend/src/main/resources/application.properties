# ===============================
# Server
# ===============================
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
spring.application.name=ThangLongUniversityWeb
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.output.ansi.enabled=always
logging.charset.console=UTF-8
logging.charset.file=UTF-8
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://localhost:3000,http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# ===============================
# Database (PostgreSQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/uni_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}

# ===============================
# Redis
# ===============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

# Refresh token TTL in Redis, in days.
application.redis.refresh-token.ttl-days=7
application.redis.fallback-in-memory-enabled=${APP_REDIS_FALLBACK_IN_MEMORY_ENABLED:true}

# ===============================
# Kafka
# ===============================
# Enable Kafka with KAFKA_ENABLED=true. Default false keeps local startup broker-free.
spring.kafka.enabled=${SPRING_KAFKA_ENABLED:${KAFKA_ENABLED:false}}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Consumer
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:university-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===============================
# JWT
# ===============================
application.security.jwt.secret-key=${APP_JWT_SECRET:CHANGE_ME_USE_openssl_rand_base64_64_IN_PRODUCTION_MIN_256bit_random_key_here}

# Access token expiration in ms, 15 minutes.
application.security.jwt.expiration=900000

# Refresh token expiration in ms, 7 days.
application.security.jwt.refresh-token.expiration=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# Cookie for refresh token
application.security.cookie.refresh-token.name=refresh_token
application.security.cookie.secure=${APP_COOKIE_SECURE:true}
application.security.cookie.same-site=${APP_COOKIE_SAME_SITE:Strict}
application.security.cookie.path=${APP_COOKIE_PATH:/}

# ===============================
# VNPAY test environment
# ===============================
vnpay.tmn-code=${VNPAY_TMN_CODE:FMQW52FA}
vnpay.hash-secret=${VNPAY_HASH_SECRET:5TO45K0S1P2URJNA3FHMFNYUURLN3NJ5}
vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
vnpay.version=2.1.0
vnpay.command=pay

# ===============================
# Groq AI
# ===============================
groq.api.key=${GROQ_API_KEY:}
groq.api.base-url=https://api.groq.com/openai/v1
groq.api.model=llama-3.3-70b-versatile
groq.api.max-tokens=2048
groq.api.temperature=0.3

# ===============================
# Cloudinary
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===============================
# Embedding / RAG
# ===============================
# HuggingFace Inference API, multilingual model, 768 dimensions.
embedding.api.url=${EMBEDDING_API_URL:https://api-inference.huggingface.co/pipeline/feature-extraction/sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
embedding.api.key=${HUGGINGFACE_API_KEY:}
embedding.dimension=768
