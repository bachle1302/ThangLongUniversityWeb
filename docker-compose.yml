services:
  # 1. DATABASE - PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: uni_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: uni_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uni-net

  # 2. CACHE - Redis Stack (Tích hợp giao diện Web RedisInsight)
  redis:
    image: redis/redis-stack:latest
    container_name: uni_redis
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - uni-net

  # 3. MESSAGE BROKER - Zookeeper (Cần cho Kafka chạy ổn định)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uni_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - uni-net

  # 4. MESSAGE BROKER - Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uni_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - uni-net

  # 5. KAFKA UI - Để bạn quản lý tin nhắn Kafka trực quan trên web (Khuyên dùng)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uni_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - uni-net

  # 6. PGADMIN - Để quản lý Database PostgreSQL trên web (Khuyên dùng)
  pgadmin:
    image: dpage/pgadmin4
    container_name: uni_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - uni-net

volumes:
  postgres_data:

networks:
  uni-net:
    driver: bridge
